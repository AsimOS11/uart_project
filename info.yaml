--- 
# Tiny Tapeout project information
project:
  title:        "8-N-1 UART Transceiver with Parity"      
  author:       "Your Friend's Name"                      
  slack:        ""                                        
  discord:      ""                                        
  description:  "A complete 8-N-1 UART Transceiver with configurable Even/Odd Parity checking, targeting 9600 baud at a 50MHz system clock."
  language:     "Verilog" 
  clock_hz:     50000000       

  # How many tiles your design occupies? A single tile is about 160x100 um.
  tiles: "1x1"          

  # Top level module name. MUST match the Verilog module name perfectly.
  top_module:  "tt_um_uart_transceiver"

  # List your project's source files here.
  source_files:
    - "project.v"

# The pinout of your project. This generates the documentation automatically.
pinout:
  # Inputs (ui_in)
  ui[0]: "tx_data_in[0] (LSB)"
  ui[1]: "tx_data_in[1]"
  ui[2]: "tx_data_in[2]"
  ui[3]: "tx_data_in[3]"
  ui[4]: "tx_data_in[4]"
  ui[5]: "tx_data_in[5]"
  ui[6]: "tx_data_in[6]"
  ui[7]: "tx_data_in[7] (MSB)"

  # Outputs (uo_out)
  uo[0]: "rx_data_out[0] (LSB)"
  uo[1]: "rx_data_out[1]"
  uo[2]: "rx_data_out[2]"
  uo[3]: "rx_data_out[3]"
  uo[4]: "rx_data_out[4]"
  uo[5]: "rx_data_out[5]"
  uo[6]: "rx_data_out[6]"
  uo[7]: "rx_data_out[7] (MSB)"

  # Bidirectional pins (uio_in / uio_out)
  uio[0]: "rx_in (Serial Input)"
  uio[1]: "tx_start (Pulse High to Transmit)"
  uio[2]: "parity_sel (0=Even, 1=Odd)"
  uio[3]: "tx_out (Serial Output)"
  uio[4]: "rx_valid (Pulses High on Success)"
  uio[5]: "parity_error (High if Error Detected)"
  uio[6]: "unused"
  uio[7]: "unused"
